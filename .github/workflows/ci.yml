name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

  compat:
    name: compat · pinned docker compose matrix
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Pinned, deterministic version set — NOT the runner's preinstalled compose.
      FRUITBOX_MATRIX_VERSIONS: "v5.2.0 v5.1.4 v5.0.2 v2.40.3"
      FRUITBOX_MATRIX_STRICT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: flag-parity matrix
        run: ./scripts/compat-matrix.sh | tee -a "$GITHUB_STEP_SUMMARY"

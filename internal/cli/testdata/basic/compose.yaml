services:
  web:
    image: nginx:1.27
    ports:
      - "8080:80"
    environment:
      - GREETING=hello
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:

networks:
  default:
    name: basic_net
